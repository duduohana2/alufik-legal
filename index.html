<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alufik — Legal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #F0F9FF 0%, #FFFFFF 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 480px;
      width: 100%;
      background: #fff;
      border-radius: 24px;
      padding: 48px 32px;
      text-align: center;
      box-shadow: 0 12px 32px rgba(124, 58, 237, 0.15);
      border: 1px solid rgba(124, 58, 237, 0.12);
    }
    .logo { font-size: 64px; margin-bottom: 16px; }
    h1 { color: #7C3AED; font-size: 32px; margin-bottom: 8px; }
    p { color: #64748B; margin-bottom: 32px; line-height: 1.5; }
    .links { display: flex; flex-direction: column; gap: 12px; }
    a {
      display: block;
      padding: 16px 24px;
      background: #7C3AED;
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 600;
      font-size: 16px;
      transition: opacity 0.2s, transform 0.2s;
    }
    a:hover { opacity: 0.9; transform: translateY(-1px); }
    a.secondary { background: #F3E8FF; color: #7C3AED; }
    .footer { margin-top: 32px; font-size: 13px; color: #94A3B8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⭐</div>
    <h1>Alufik</h1>
    <p>Family chores game for kids and parents</p>
    <div class="links">
      <a href="./privacy.html">Privacy Policy / מדיניות פרטיות</a>
      <a href="./terms.html" class="secondary">Terms of Service / תנאי שימוש</a>
    </div>
    <div class="footer">© 2026 Alufik</div>
  </div>
</body>
</html>
