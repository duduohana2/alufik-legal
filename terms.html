<html lang="en">

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #F8FAFC;
      color: #1A1A3D;
      line-height: 1.6;
      padding: 24px;
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
      background: #fff;
      padding: 40px 32px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.05);
    }
    .toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
      background: #F3E8FF;
      padding: 4px;
      border-radius: 12px;
    }
    .toggle button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      background: transparent;
      color: #7C3AED;
      font-size: 15px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .toggle button.active {
      background: #7C3AED;
      color: #fff;
    }
    h1 { color: #7C3AED; font-size: 28px; margin-bottom: 8px; }
    .content[dir="rtl"] { text-align: right; }
    .content { white-space: pre-wrap; font-size: 16px; line-height: 1.7; }
    .back {
      display: inline-block;
      margin-top: 32px;
      padding: 12px 20px;
      background: #F3E8FF;
      color: #7C3AED;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
    }
    .back:hover { background: #E9D5FF; }
  </style>
</head>
<body>
  <div class="container">
    <div class="toggle">
      <button id="btn-en" class="active" onclick="show('en')">English</button>
      <button id="btn-he" onclick="show('he')">עברית</button>
    </div>

    <div id="content-en" class="content" dir="ltr"></div>
    <div id="content-he" class="content" dir="rtl" style="display: none;"></div>

    <a href="./" class="back">← Back</a>
  </div>

    document.getElementById('content-en').textContent = EN;
    document.getElementById('content-he').textContent = HE;

    function show(lang) {
      document.getElementById('content-en').style.display = lang === 'en' ? 'block' : 'none';
      document.getElementById('content-he').style.display = lang === 'he' ? 'block' : 'none';
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');

</body>
</html>
